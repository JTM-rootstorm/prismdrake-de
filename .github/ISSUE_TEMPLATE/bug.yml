name: Bug report
description: Report reproducible incorrect Prismdrake behavior or contract validation
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what contract or behavior did you expect?
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision or version
      placeholder: Commit hash or release version
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include minimal steps and sanitized diagnostics.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and capabilities
      description: Include X11 environment, profile, and relevant optional capabilities without private data.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, private paths, notification bodies, and window titles.
          required: true
