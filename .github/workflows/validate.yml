name: Prismdrake validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Ubuntu 24.04 provides Qt 6.4, below Prismdrake's supported Qt 6.11 floor.
  # Product builds, tests, formatting, and QML lint run in the Gentoo reference
  # environment until a hosted runner supplies the supported system toolkit.
  contracts:
    name: Validate repository contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run contract validation
        run: make validate
