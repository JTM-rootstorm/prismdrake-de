    <text x="266" y="386" fill="#d9cfbf" font-family="sans-serif" font-size="14">Generic document</text>
    <text x="266" y="420" fill="#d9cfbf" font-family="sans-serif" font-size="14">Local project</text>
  </g>
  <text x="90" y="646" fill="#fff8ec" font-family="sans-serif" font-size="13">Same semantic component structure as Lustre; opaque materials, tighter spacing, stronger state borders, shorter motion.</text>
