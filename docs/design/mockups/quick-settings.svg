<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Prismdrake quick settings low-fidelity mockup</title>
  <desc id="desc">Quick settings standard and high-contrast opaque states with typed external service controls and accessible labels.</desc>
  <rect width="1100" height="700" fill="#263149"/>
  <text x="24" y="34" fill="#fff" font-family="sans-serif" font-size="16">QUICK SETTINGS AND ACCESSIBILITY FALLBACK · LOW-FIDELITY</text>
  <g transform="translate(60 74)" font-family="sans-serif">
    <rect width="450" height="500" rx="18" fill="#303e5b" fill-opacity="0.9" stroke="#8ce3e9" stroke-width="2"/>
    <text x="24" y="42" fill="#fff" font-size="19">Quick settings · Lustre</text>
    <g fill="#425574" stroke="#7085a7"><rect x="24" y="72" width="190" height="78" rx="12"/><rect x="236" y="72" width="190" height="78" rx="12"/><rect x="24" y="168" width="190" height="78" rx="12"/><rect x="236" y="168" width="190" height="78" rx="12"/></g>
    <g fill="#fff" font-size="15"><text x="46" y="106">Network</text><text x="46" y="130">Connected</text><text x="258" y="106">Bluetooth</text><text x="258" y="130">Off</text><text x="46" y="202">Night tint</text><text x="46" y="226">Off</text><text x="258" y="202">Do not disturb</text><text x="258" y="226">On</text></g>
    <text x="24" y="286" fill="#dce5f1" font-size="14">Volume · 60 percent</text><rect x="24" y="302" width="402" height="12" rx="6" fill="#19233a"/><rect x="24" y="302" width="242" height="12" rx="6" fill="#74d6df"/>
    <text x="24" y="356" fill="#dce5f1" font-size="14">Brightness · unavailable</text><rect x="24" y="374" width="402" height="44" rx="9" fill="#28354f"/><text x="42" y="402" fill="#aeb9ca" font-size="13">No supported brightness service</text>
  </g>
  <g transform="translate(590 74)" font-family="sans-serif">
    <rect width="450" height="500" rx="7" fill="#000" stroke="#fff" stroke-width="4"/>
    <text x="24" y="42" fill="#fff" font-size="19">High contrast · opaque</text>
    <g fill="#151515" stroke="#fff" stroke-width="3"><rect x="24" y="72" width="190" height="78" rx="4"/><rect x="236" y="72" width="190" height="78" rx="4"/><rect x="24" y="168" width="190" height="78" rx="4"/><rect x="236" y="168" width="190" height="78" rx="4"/></g>
    <rect x="20" y="68" width="198" height="86" rx="6" fill="none" stroke="#fff200" stroke-width="4"/>
    <g fill="#fff" font-size="15"><text x="46" y="106">Network · focused</text><text x="46" y="130">Connected</text><text x="258" y="106">Bluetooth</text><text x="258" y="130">Off</text><text x="46" y="202">Night tint</text><text x="46" y="226">Off</text><text x="258" y="202">Do not disturb</text><text x="258" y="226">On</text></g>
    <text x="24" y="286" fill="#fff" font-size="14">Volume · 60 percent</text><rect x="24" y="302" width="402" height="16" fill="#333" stroke="#fff" stroke-width="2"/><rect x="26" y="304" width="238" height="12" fill="#006bff"/>
    <text x="24" y="358" fill="#fff" font-size="14">Reduced motion · enabled</text><text x="24" y="394" fill="#fff" font-size="14">Transparency · disabled</text>
  </g>
  <text x="60" y="626" fill="#fff" font-family="sans-serif" font-size="13">External audio, network, Bluetooth, and power services remain authoritative; controls use typed adapters and disable individually.</text>
  <text x="60" y="650" fill="#d5ddea" font-family="sans-serif" font-size="13">All controls expose name, role, value/checked state, availability, keyboard focus, and token-defined minimum target size.</text>
</svg>
